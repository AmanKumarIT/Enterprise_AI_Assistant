version: '3.8'

services:
  # ── Backend API ─────────────────────────────────────

  # ── Backend API ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eka_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 10000 --reload
    environment:
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
      - REDIS_URL=${REDIS_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama3-70b-8192}
      - LLM_BASE_URL=${LLM_BASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Worker ────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eka_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI}
      - REDIS_URL=${REDIS_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama3-70b-8192}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Beat Scheduler ────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eka_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=${REDIS_URL}
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eka_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  # No local infrastructure volumes needed as we use cloud services.
